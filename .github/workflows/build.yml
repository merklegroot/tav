name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and build
        run: dotnet build Tav.csproj --configuration Release

      - name: Capture settled console (main screen)
        env:
          TAV_SNAPSHOT: "1"
        run: |
          set -euo pipefail
          mkdir -p ci
          dotnet run --project Tav.csproj --configuration Release --no-build > ci/console-snapshot.txt
          echo "---- console snapshot (first frame, plain text) ----"
          cat ci/console-snapshot.txt

      - name: Upload console snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: console-snapshot
          path: ci/console-snapshot.txt
